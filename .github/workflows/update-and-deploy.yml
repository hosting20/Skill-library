# Refreshes the skills catalog from GitHub daily, commits it, and deploys
# the site to GitHub Pages. Also runs on every push to main and on demand
# (Actions tab → "Update catalog and deploy" → Run workflow).

name: Update catalog and deploy

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # push the refreshed catalog.json
  pages: write # deploy to GitHub Pages
  id-token: write # Pages deployment auth

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Import latest skills from GitHub
        env:
          # Actions' built-in token → 5000 req/hr, full star coverage
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run import

      - name: Commit refreshed catalog
        run: |
          if ! git diff --quiet src/data/catalog.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/catalog.json
            git commit -m "chore: refresh skills catalog"
            git push
          else
            echo "Catalog unchanged."
          fi

      - name: Build site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
